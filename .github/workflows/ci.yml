name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: "1"
  RUST_TOOLCHAIN: "1.93.0"

jobs:
  quality:
    name: ${{ matrix.os }} / Rust 1.93.0
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup toolchain install ${{ env.RUST_TOOLCHAIN }} --profile minimal --component clippy,rustfmt

      - name: Set Rust toolchain override
        run: rustup override set ${{ env.RUST_TOOLCHAIN }}

      - name: Show active Rust versions
        run: |
          rustup show active-toolchain
          rustc --version --verbose
          cargo --version
          cargo clippy --version
          cargo fmt --version

      - name: Cache Cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: cargo-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}-
            cargo-${{ runner.os }}-

      - name: Validate Cargo metadata
        run: cargo +${{ env.RUST_TOOLCHAIN }} metadata --locked --format-version 1

      - name: Check formatting
        run: cargo +${{ env.RUST_TOOLCHAIN }} fmt --all -- --check

      - name: Run Clippy
        run: cargo +${{ env.RUST_TOOLCHAIN }} clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Run tests
        run: cargo +${{ env.RUST_TOOLCHAIN }} test --workspace --all-targets --all-features --locked

      - name: Run documentation tests
        run: cargo +${{ env.RUST_TOOLCHAIN }} test --workspace --doc --all-features --locked

      - name: Build release artifacts
        run: cargo +${{ env.RUST_TOOLCHAIN }} build --workspace --release --all-features --locked

  msrv:
    name: MSRV Rust 1.93.0
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install MSRV toolchain
        run: rustup toolchain install ${{ env.RUST_TOOLCHAIN }} --profile minimal

      - name: Set MSRV toolchain override
        run: rustup override set ${{ env.RUST_TOOLCHAIN }}

      - name: Show active Rust version
        run: |
          rustup show active-toolchain
          rustc --version --verbose
          cargo --version

      - name: Cache Cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: cargo-${{ runner.os }}-msrv-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-msrv-${{ env.RUST_TOOLCHAIN }}-
            cargo-${{ runner.os }}-

      - name: Check MSRV compatibility
        run: cargo +${{ env.RUST_TOOLCHAIN }} check --workspace --all-targets --all-features --locked

  supply-chain:
    name: Audit and dependency policy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup toolchain install ${{ env.RUST_TOOLCHAIN }} --profile minimal

      - name: Set Rust toolchain override
        run: rustup override set ${{ env.RUST_TOOLCHAIN }}

      - name: Show active Rust version
        run: |
          rustup show active-toolchain
          rustc --version --verbose
          cargo --version

      - name: Cache Cargo tools and registries
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-tools-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}-audit-0.22.2-deny-0.20.2
          restore-keys: |
            cargo-tools-${{ runner.os }}-${{ env.RUST_TOOLCHAIN }}-

      - name: Install cargo-audit
        run: cargo +${{ env.RUST_TOOLCHAIN }} install cargo-audit --version 0.22.2 --locked --force

      - name: Install cargo-deny
        run: cargo +${{ env.RUST_TOOLCHAIN }} install cargo-deny --version 0.20.2 --locked --force

      - name: Check security advisories
        run: cargo +${{ env.RUST_TOOLCHAIN }} audit

      - name: Check dependency policies
        run: cargo +${{ env.RUST_TOOLCHAIN }} deny check

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294
        with:
          fail-on-severity: moderate
